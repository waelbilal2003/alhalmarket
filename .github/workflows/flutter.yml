name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Clean
        run: flutter clean

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup Visual Studio C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install VC++ Redistributable (x64)
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          Start-Process -FilePath "./vc_redist.x64.exe" -ArgumentList "/install", "/quiet", "/norestart" -Wait
        shell: powershell

      - name: Build Windows Release (x64)
        run: flutter build windows --release

      - name: Debug Folder Structure (x64)
        run: |
          Write-Host "Debugging build folders..."
          Get-ChildItem -Path "build" -Recurse | Where-Object {$_.Name -like "*.dll" -or $_.Name -like "*.exe"} | Select-Object FullName
        shell: powershell

      - name: Collect Required DLLs (x64)
        run: |
          $releaseDir = $null
          $searchPaths = @(
            "build/windows/x64/runner/Release",
            "build/windows/runner/Release",
            "build/windows/x64/windows/runner/Release"
          )
          foreach ($path in $searchPaths) {
            if (Test-Path "$path/*.exe") { $releaseDir = $path; break }
          }
          if (-not $releaseDir) { Write-Host "Error: release dir not found"; exit 1 }
          Write-Host "Found: $releaseDir"

          $vcDlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")
          foreach ($dll in $vcDlls) {
            $dest = "$releaseDir\$dll"
            if (-not (Test-Path $dest)) {
              $src = "C:\Windows\System32\$dll"
              if (Test-Path $src) { Copy-Item $src $dest -Force; Write-Host "Copied $dll" }
              else { Write-Host "Warning: $dll not found" }
            } else { Write-Host "OK $dll" }
          }

          $pluginDlls = @("pdfium.dll", "printing_plugin.dll", "sqlite3.x64.windows.dll")
          foreach ($dll in $pluginDlls) {
            $dest = "$releaseDir\$dll"
            if (Test-Path $dest) { Write-Host "OK $dll"; continue }
            $found = $false
            :loop foreach ($pattern in @("build/**/$dll","build/windows/**/$dll","build/windows/x64/**/$dll")) {
              $files = Get-ChildItem -Path $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -ne $dest }
              if ($files) {
                foreach ($f in $files) {
                  if ($f.Directory.FullName -eq $releaseDir) { continue }
                  Copy-Item $f.FullName $dest -Force; Write-Host "Copied $dll"; $found = $true; break :loop
                }
              }
            }
            if (-not $found) { Write-Host "Warning: $dll not found" }
          }
        shell: powershell

      - name: Package as ZIP (x64)
        run: |
          $releaseDir = $null
          foreach ($path in @("build/windows/x64/runner/Release","build/windows/runner/Release","build/windows/x64/windows/runner/Release")) {
            if (Test-Path "$path/*.exe") { $releaseDir = $path; break }
          }
          if (-not $releaseDir) { Write-Host "Error: release dir not found"; exit 1 }
          Compress-Archive -Path "$releaseDir/*" -DestinationPath "windows-app-x64.zip" -Force
        shell: powershell

      - name: Upload ZIP Artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64-zip
          path: windows-app-x64.zip

  build-windows-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Clean
        run: flutter clean

      - name: Setup Visual Studio C++ Build Tools (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install VC++ Redistributable (x86)
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x86.exe" -OutFile "vc_redist.x86.exe"
          Start-Process -FilePath "./vc_redist.x86.exe" -ArgumentList "/install", "/quiet", "/norestart" -Wait
        shell: powershell

      - name: Flutter Pub Get (x86)
        run: flutter pub get

      - name: Build Flutter dart artifacts
        run: flutter build windows --release

      - name: Strip printing plugin from generated files (not supported on x86)
        run: |
          $genPlugins = "windows/flutter/generated_plugins.cmake"
          if (Test-Path $genPlugins) {
            $lines = Get-Content $genPlugins
            $filtered = $lines | Where-Object { $_ -notmatch '\bprinting\b' }
            Set-Content $genPlugins $filtered -Encoding UTF8
            Write-Host "Patched generated_plugins.cmake"
          }

          $genReg = "windows/flutter/generated_plugin_registrant.cc"
          if (Test-Path $genReg) {
            $lines = Get-Content $genReg
            $filtered = $lines | Where-Object {
              ($_ -notmatch 'printing_plugin\.h') -and ($_ -notmatch 'PrintingPlugin')
            }
            Set-Content $genReg $filtered -Encoding UTF8
            Write-Host "Patched generated_plugin_registrant.cc"
          }
        shell: powershell

      - name: Build Windows x86 via CMake (Win32)
        run: |
          $cmakeBuildDir = "build/windows/x86"
          cmake -S windows -B $cmakeBuildDir -A Win32
          cmake --build $cmakeBuildDir --config Release
        shell: powershell

      - name: Debug Folder Structure (x86)
        run: |
          Write-Host "Debugging build folders..."
          Get-ChildItem -Path "build" -Recurse | Where-Object {$_.Name -like "*.dll" -or $_.Name -like "*.exe"} | Select-Object FullName
        shell: powershell

      - name: Collect Required DLLs (x86)
        run: |
          $releaseDir = $null
          foreach ($path in @("build/windows/x86/runner/Release","build/windows/runner/Release")) {
            if (Test-Path "$path/*.exe") { $releaseDir = $path; break }
          }
          if (-not $releaseDir) { Write-Host "Error: release dir not found"; exit 1 }
          Write-Host "Found: $releaseDir"

          $vcDlls = @("msvcp140.dll", "vcruntime140.dll")
          foreach ($dll in $vcDlls) {
            $dest = "$releaseDir\$dll"
            if (-not (Test-Path $dest)) {
              $src = "C:\Windows\SysWOW64\$dll"
              if (Test-Path $src) { Copy-Item $src $dest -Force; Write-Host "Copied $dll from SysWOW64" }
              else { Write-Host "Warning: $dll not found in SysWOW64" }
            } else { Write-Host "OK $dll" }
          }

          $pluginDlls = @("sqlite3.x86.windows.dll")
          foreach ($dll in $pluginDlls) {
            $dest = "$releaseDir\$dll"
            if (Test-Path $dest) { Write-Host "OK $dll"; continue }
            $found = $false
            :loop foreach ($pattern in @("build/**/$dll","build/windows/**/$dll","build/windows/x86/**/$dll")) {
              $files = Get-ChildItem -Path $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -ne $dest }
              if ($files) {
                foreach ($f in $files) {
                  if ($f.Directory.FullName -eq $releaseDir) { continue }
                  Copy-Item $f.FullName $dest -Force; Write-Host "Copied $dll"; $found = $true; break :loop
                }
              }
            }
            if (-not $found) { Write-Host "Warning: $dll not found" }
          }
        shell: powershell

      - name: Package as ZIP (x86)
        run: |
          $releaseDir = $null
          foreach ($path in @("build/windows/x86/runner/Release","build/windows/runner/Release")) {
            if (Test-Path "$path/*.exe") { $releaseDir = $path; break }
          }
          if (-not $releaseDir) { Write-Host "Error: release dir not found"; exit 1 }
          Compress-Archive -Path "$releaseDir/*" -DestinationPath "windows-app-x86.zip" -Force
        shell: powershell

      - name: Upload ZIP Artifact (x86)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86-zip
          path: windows-app-x86.zip