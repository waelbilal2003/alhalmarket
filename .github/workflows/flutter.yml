name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Clean
        run: flutter clean

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup Visual Studio C++ Build Tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install VC++ Redistributable (x64)
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          Start-Process -FilePath "./vc_redist.x64.exe" -ArgumentList "/install", "/quiet", "/norestart" -Wait
        shell: powershell

      - name: Build Windows Release (x64)
        run: flutter build windows --release

      - name: Debug Folder Structure (x64)
        run: |
          Write-Host "Debugging build folders..."
          Get-ChildItem -Path "build" -Recurse | Where-Object {$_.Name -like "*.dll" -or $_.Name -like "*.exe"} | Select-Object FullName
        shell: powershell

      - name: Collect Required DLLs (x64)
        run: |
          $releaseDir = $null
          $searchPaths = @(
            "build/windows/x64/runner/Release",
            "build/windows/runner/Release",
            "build/windows/x64/windows/runner/Release"
          )

          foreach ($path in $searchPaths) {
            if (Test-Path "$path/*.exe") {
              $releaseDir = $path
              break
            }
          }

          if (-not $releaseDir) {
            Write-Host "Error: Could not find release directory with .exe file"
            exit 1
          }

          Write-Host "Found release directory: $releaseDir"

          $vcDlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll")
          foreach ($dll in $vcDlls) {
            $dest = "$releaseDir\$dll"
            if (-not (Test-Path $dest)) {
              $src = "C:\Windows\System32\$dll"
              if (Test-Path $src) {
                Copy-Item $src $dest -Force
                Write-Host "Copied $dll from System32"
              } else {
                Write-Host "Warning: $dll not found in System32"
              }
            } else {
              Write-Host "✅ $dll already exists"
            }
          }

          $pluginDlls = @("pdfium.dll", "printing_plugin.dll", "sqlite3.x64.windows.dll")
          foreach ($dll in $pluginDlls) {
            $dest = "$releaseDir\$dll"

            if (Test-Path $dest) {
              Write-Host "✅ $dll already exists in release directory"
              continue
            }

            $found = $false
            $searchPatterns = @(
              "build/**/$dll",
              "build/windows/**/$dll",
              "build/windows/x64/**/$dll"
            )

            :patternLoop foreach ($pattern in $searchPatterns) {
              $files = Get-ChildItem -Path $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -ne $dest }
              if ($files) {
                foreach ($file in $files) {
                  if ($file.Directory.FullName -eq $releaseDir) { continue }
                  Copy-Item $file.FullName $dest -Force
                  Write-Host "Copied $dll from $($file.FullName)"
                  $found = $true
                  break :patternLoop
                }
              }
            }

            if (-not $found) {
              Write-Host "⚠️ $dll not found - this plugin may not work on Windows"
            }
          }
        shell: powershell

      - name: Package as ZIP (x64)
        run: |
          $releaseDir = $null
          $searchPaths = @(
            "build/windows/x64/runner/Release",
            "build/windows/runner/Release",
            "build/windows/x64/windows/runner/Release"
          )

          foreach ($path in $searchPaths) {
            if (Test-Path "$path/*.exe") {
              $releaseDir = $path
              break
            }
          }

          if (-not $releaseDir) {
            Write-Host "Error: Could not find release directory for ZIP"
            exit 1
          }

          Compress-Archive -Path "$releaseDir/*" -DestinationPath "windows-app-x64.zip" -Force
          Write-Host "Created ZIP file: windows-app-x64.zip"
        shell: powershell

      - name: Upload ZIP Artifact (x64)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64-zip
          path: windows-app-x64.zip

  build-windows-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Clean
        run: flutter clean

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup Visual Studio C++ Build Tools (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install VC++ Redistributable (x86)
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x86.exe" -OutFile "vc_redist.x86.exe"
          Start-Process -FilePath "./vc_redist.x86.exe" -ArgumentList "/install", "/quiet", "/norestart" -Wait
        shell: powershell

      - name: Build Windows Release (x86 / 32-bit)
        run: |
          flutter build windows --release
          $buildDir = "build/windows/x86/runner/Release"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          
          # Re-run CMake targeting Win32 (x86)
          $cmakeBuildDir = "build/windows/x86"
          cmake -S windows -B $cmakeBuildDir -A Win32
          cmake --build $cmakeBuildDir --config Release
        shell: powershell

      - name: Debug Folder Structure (x86)
        run: |
          Write-Host "Debugging build folders..."
          Get-ChildItem -Path "build" -Recurse | Where-Object {$_.Name -like "*.dll" -or $_.Name -like "*.exe"} | Select-Object FullName
        shell: powershell

      - name: Collect Required DLLs (x86)
        run: |
          $releaseDir = $null
          $searchPaths = @(
            "build/windows/x86/runner/Release",
            "build/windows/runner/Release"
          )

          foreach ($path in $searchPaths) {
            if (Test-Path "$path/*.exe") {
              $releaseDir = $path
              break
            }
          }

          if (-not $releaseDir) {
            Write-Host "Error: Could not find release directory with .exe file"
            exit 1
          }

          Write-Host "Found release directory: $releaseDir"

          # Use SysWOW64 for 32-bit DLLs on a 64-bit host
          $vcDlls = @("msvcp140.dll", "vcruntime140.dll")
          foreach ($dll in $vcDlls) {
            $dest = "$releaseDir\$dll"
            if (-not (Test-Path $dest)) {
              $src = "C:\Windows\SysWOW64\$dll"
              if (Test-Path $src) {
                Copy-Item $src $dest -Force
                Write-Host "Copied $dll from SysWOW64"
              } else {
                Write-Host "Warning: $dll not found in SysWOW64"
              }
            } else {
              Write-Host "✅ $dll already exists"
            }
          }

          $pluginDlls = @("pdfium.dll", "printing_plugin.dll", "sqlite3.x86.windows.dll")
          foreach ($dll in $pluginDlls) {
            $dest = "$releaseDir\$dll"

            if (Test-Path $dest) {
              Write-Host "✅ $dll already exists in release directory"
              continue
            }

            $found = $false
            $searchPatterns = @(
              "build/**/$dll",
              "build/windows/**/$dll",
              "build/windows/x86/**/$dll"
            )

            :patternLoop foreach ($pattern in $searchPatterns) {
              $files = Get-ChildItem -Path $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -ne $dest }
              if ($files) {
                foreach ($file in $files) {
                  if ($file.Directory.FullName -eq $releaseDir) { continue }
                  Copy-Item $file.FullName $dest -Force
                  Write-Host "Copied $dll from $($file.FullName)"
                  $found = $true
                  break :patternLoop
                }
              }
            }

            if (-not $found) {
              Write-Host "⚠️ $dll not found - this plugin may not work on Windows x86"
            }
          }
        shell: powershell

      - name: Package as ZIP (x86)
        run: |
          $releaseDir = $null
          $searchPaths = @(
            "build/windows/x86/runner/Release",
            "build/windows/runner/Release"
          )

          foreach ($path in $searchPaths) {
            if (Test-Path "$path/*.exe") {
              $releaseDir = $path
              break
            }
          }

          if (-not $releaseDir) {
            Write-Host "Error: Could not find release directory for ZIP"
            exit 1
          }

          Compress-Archive -Path "$releaseDir/*" -DestinationPath "windows-app-x86.zip" -Force
          Write-Host "Created ZIP file: windows-app-x86.zip"
        shell: powershell

      - name: Upload ZIP Artifact (x86)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86-zip
          path: windows-app-x86.zip